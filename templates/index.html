<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Titanic Predictor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
color:white;
}

.container{
width:420px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:32px;
color:#38bdf8;
}

h2{
text-align:center;
margin-bottom:30px;
font-size:16px;
color:#cbd5e1;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
transition:0.3s;
}

input:focus{
border:1px solid #38bdf8;
box-shadow:0 0 10px #38bdf8;
}

input::placeholder{
color:#94a3b8;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#38bdf8);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px #38bdf8;
}

.result{
margin-top:25px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#22c55e;
}
.note{
position:fixed;
bottom:15px;
right:15px;
width:320px;
font-size:12px;
color:#94a3b8;
opacity:0.7;
line-height:1.4;
}
</style>
</head>

<body>

<div class="container">

<h1>TITANIC 🚢</h1>

<h2>Will You Survive?</h2>

<form action="/predict" method="POST">

<input type="text" name="sex" placeholder="Enter Gender (male)/(female) : ">

<input type="number" name="age" placeholder="Enter Age : ">

<input type="number" name="pclass" placeholder="Passenger Class 1/2/3 : ">

<input type="number" name="fare" placeholder="Ticket Fare : ">

<input type="number" name="sibsp" placeholder="Siblings Count : ">

<input type="number" name="parch" placeholder="Parents Count : ">

<button type="submit">
Predict Survival
</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>
<div class="note">
During the Titanic sinking in 1912, approximately 70% of women and children survived, compared to only about 20% of men. This was largely due to the "women and children first" evacuation policy.
</div>
</body>

</html>
